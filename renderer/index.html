<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<title>نظام إدارة المدرسة القرآنية</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen" class="login-screen">
  <div class="login-bg">
    <div class="login-orb orb1"></div>
    <div class="login-orb orb2"></div>
    <div class="login-orb orb3"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">☽</div>
      <h1 class="login-title">نور القرآن</h1>
      <p class="login-sub">نظام إدارة المدرسة القرآنية</p>
    </div>
    <div class="login-ayah">﴿ وَرَتِّلِ الْقُرْآنَ تَرْتِيلًا ﴾</div>
    <div class="login-form">
      <label class="login-label">من أنت؟</label>
      <select class="login-select" id="login-who">
        <option value="">— اختر —</option>
        <option value="admin">🔑 المدير (عرض كامل)</option>
      </select>
      <button class="login-btn" id="login-btn">دخول ←</button>
    </div>
    <div class="login-footer">إصدار 2.0 • المدرسة القرآنية</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" class="app hidden">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">☽</div>
      <div>
        <div class="brand-title">نور القرآن</div>
        <div class="brand-sub">نظام الإدارة</div>
      </div>
    </div>

    <div class="sidebar-session" id="session-info">
      <div class="session-avatar" id="session-avatar">👤</div>
      <div>
        <div class="session-name" id="session-name">المدير</div>
        <div class="session-role" id="session-role">عرض كامل</div>
      </div>
      <button class="session-logout" id="btn-logout" title="خروج">↩</button>
    </div>

    <nav class="nav">
      <div class="nav-label">الرئيسية</div>
      <button class="nav-btn active" data-page="dashboard">
        <span class="nav-ico">⊞</span> لوحة التحكم
      </button>
      <button class="nav-btn" data-page="students" id="nav-students">
        <span class="nav-ico">👥</span> الطلاب
        <span class="nav-badge" id="nb-students">0</span>
      </button>
      <button class="nav-btn admin-only" data-page="teachers">
        <span class="nav-ico">🎓</span> الأساتذة
        <span class="nav-badge" id="nb-teachers">0</span>
      </button>
      <div class="nav-label">العمليات</div>
      <button class="nav-btn" data-page="memorization">
        <span class="nav-ico">📖</span> تسجيل الحفظ
      </button>
      <button class="nav-btn" data-page="attendance">
        <span class="nav-ico">✅</span> الحضور
      </button>
      <button class="nav-btn" data-page="reports">
        <span class="nav-ico">📊</span> التقارير
      </button>
    </nav>

    <div class="sidebar-foot">﴿ خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ ﴾</div>
  </aside>

  <div class="layout-main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="topbar-title">لوحة التحكم</div>
        <div class="topbar-dates" id="topbar-dates"></div>
      </div>
      <button class="topbar-refresh" id="btn-refresh" title="تحديث">↻</button>
    </header>

    <main class="main">
      <div id="page-dashboard"    class="page active"></div>
      <div id="page-students"     class="page"></div>
      <div id="page-teachers"     class="page"></div>
      <div id="page-memorization" class="page"></div>
      <div id="page-attendance"   class="page"></div>
      <div id="page-reports"      class="page"></div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button id="modal-close" class="modal-close">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<div id="print-area" class="print-area"></div>

<script src="app.js"></script>
</body>
</html>
